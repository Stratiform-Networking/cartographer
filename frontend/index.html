		<script>
			(function () {
				try {
					var s = localStorage.getItem('cartographer_darkMode');
					if (
						s === 'true' ||
						(!s && window.matchMedia('(prefers-color-scheme: dark)').matches)
					)
						document.documentElement.classList.add('dark');
				} catch (e) {}
			})();
		</script>
